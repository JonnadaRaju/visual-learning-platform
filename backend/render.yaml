services:
  - type: web
    name: eduviz-backend
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    pythonVersion: "3.11"
    envVars:
      - key: APP_NAME
        value: EduViz
      - key: APP_ENV
        value: production
      - key: APP_PORT
        value: 8000
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_TTL
        value: "600"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: OPENROUTER_KEY
        sync: false
